name: Azure Static Web Apps CI/CD

# Esteira simples e determinística:
# 1. checkout
# 2. setup Node 20 + cache npm
# 3. npm ci + npm run build (Vite gera em dist/)
# 4. deploy do dist/ direto, com skip_app_build=true (pula Oryx)
#
# Por que skip_app_build? O auto-build da Azure (Oryx) detecta Vite
# inconsistentemente e usa output_location "build" (default CRA) em
# vez de "dist" (Vite). Construindo aqui mesmo evita esses problemas.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # 2. Setup Node 20 com cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instala deps respeitando o package-lock
      - name: Install dependencies
        run: npm ci

      # 4. Build (Vite → dist/)
      - name: Build
        run: npm run build

      # 5. Deploy: aponta direto pra dist/ e pula o auto-build
      # OIDC token removido — não é necessário quando temos api_token,
      # e o step estava falhando porque o token vence muito rápido.
      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_PEBBLE_08BAF630F }}
          action: 'upload'
          app_location: 'dist'      # já buildado neste workflow
          api_location: ''          # sem backend
          output_location: ''       # ignorado com skip_app_build=true
          skip_app_build: true
          skip_api_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_PEBBLE_08BAF630F }}
          action: 'close'
