name: Azure Static Web Apps CI/CD

# Esteira simples e determinística:
# 1. checkout
# 2. setup Node 20 + cache npm
# 3. npm ci + npm run build (Vite gera em dist/)
# 4. deploy do dist/ direto, com skip_app_build=true (pula Oryx)
#
# Por que skip_app_build? O auto-build da Azure (Oryx) detecta Vite
# inconsistentemente e usa output_location "build" (default CRA) em
# vez de "dist" (Vite). Construindo aqui mesmo evita esses problemas.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # 2. Setup Node 20 com cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instala deps respeitando o package-lock
      - name: Install dependencies
        run: npm ci

      # 4. Build (Vite → dist/)
      - name: Build
        run: npm run build

      # 5. Deploy via SWA CLI direto
      # Bypassa o GitHub Action (Azure/static-web-apps-deploy@v1) que
      # spawna container Oryx mesmo com skip_app_build=true e é frágil.
      # `swa deploy` é a CLI oficial do Azure SWA — mais confiável.
      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Static Web Apps
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_PEBBLE_08BAF630F }}
        run: |
          swa deploy ./dist \
            --deployment-token "$SWA_CLI_DEPLOYMENT_TOKEN" \
            --env production \
            --verbose silly

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_PEBBLE_08BAF630F }}
          action: 'close'
